  // ✅ Function to render all market cards
function renderMarketCards(games) {
  Object.entries(games).forEach(([key, raw]) => {
    if (!raw || typeof raw !== "string" || raw === "x") return;

    const data = JSON.parse(raw);
    if (!data || data.length < 9) return;

    const [marketName, result, openTime, closeTime, isEnabled, isVisible, days, pattern, tip] = data;
    if (!isVisible) return;

    let status = "Open Running", statusColor = "green", imageSrc = "blue.png", disabledAlert = "";
    if (!isEnabled) {
      status = "Market Disabled";
      statusColor = "red";
      imageSrc = "red.png";
      disabledAlert = "Market Disabled";
    } else if (!days.toString().includes(currentDay.toString())) {
      status = "Holiday Declared";
      statusColor = "red";
      imageSrc = "red.png";
      disabledAlert = "Holiday Declared For This Market";
    } else if (currentTime < openTime) {
      status = "Open Running";
      statusColor = "green";
      imageSrc = "blue.png";
    } else if (currentTime >= openTime && currentTime < closeTime) {
      status = "Close Running";
      statusColor = "darkorange";
      imageSrc = "yellow.png";
    } else {
      status = "Market Closed";
      statusColor = "red";
      imageSrc = "red.png";
      disabledAlert = "Market Closed";
    }

    // ✅ Check if card already exists
    let existingCard = document.querySelector(`.market-card[data-market="${marketName}"]`);
    if (existingCard) {
      // Replace content
      existingCard.querySelector(".market-name").textContent = marketName;
      existingCard.querySelector(".market-result").textContent = result;
      const marketTimes = existingCard.querySelectorAll(".market-time");
      if (marketTimes.length === 2) {
        marketTimes[0].textContent = formatTime(openTime);
        marketTimes[1].textContent = formatTime(closeTime);
      }
      existingCard.querySelector(".market-status").textContent = status;
      existingCard.querySelector(".market-status").style.color = statusColor;
      existingCard.querySelector(".play-icon").src = `assets/${imageSrc}`;
      existingCard.querySelector(".play-icon").onclick = imageSrc === "blue.png" || imageSrc === "yellow.png"
        ? () => {
            localStorage.setItem("marketName", marketName);
            localStorage.setItem("marketType", imageSrc === "blue.png" ? "Open" : "Close");
            console.log("redirect=type.html");
          }
        : () => alertsnack("red", disabledAlert);

    } else {
      // Create new card
      const card = document.createElement("div");
      card.className = "market-card";
      card.setAttribute("data-market", marketName); // ✅ Unique identifier

      card.innerHTML = `
        <div class="market-header">
          <img src="https://cdn-icons-png.flaticon.com/128/3652/3652191.png" alt="Chart" class="chart-icon" data-market="${marketName}">
          <div class="market-info">
            <div class="market-column">
              <div class="market-name">${marketName}</div>
              <div class="market-result">${result}</div>
            </div>
            <div class="market-column">
              <div class="market-time">${formatTime(openTime)}</div>
              <div class="market-time">${formatTime(closeTime)}</div>
            </div>
          </div>
          <img src="assets/${imageSrc}" class="play-icon" data-market="${marketName}" alt="Play">
        </div>
        <div class="market-status" style="color:${statusColor}">${status}</div>
      `;

      const playBtn = card.querySelector(".play-icon");
      if (imageSrc === "blue.png" || imageSrc === "yellow.png") {
        playBtn.onclick = () => {
          localStorage.setItem("marketName", marketName);
          localStorage.setItem("marketType", imageSrc === "blue.png" ? "Open" : "Close");
          console.log("redirect=type.html");
        };
      } else {
        playBtn.onclick = () => alertsnack("red", disabledAlert);
      }

      const chartBtn = card.querySelector(".chart-icon");
      chartBtn.onclick = () => {
        localStorage.setItem("chartMarket", marketName);
        console.log(`chart=${localStorage.getItem('R-URL').replace("--ID--", marketName.replace(/\s+/g, "-").toLowerCase())}`);
      };

      container.appendChild(card);
    }
  });
}

  (async function () {
    const FU = localStorage.getItem("FU");
    const FT = localStorage.getItem("FT");
    const userid = localStorage.getItem("userid");
    const localDID = localStorage.getItem("DID");

    const config = {
      databaseURL: FU,
      apiKey: FT,
    };

    if (!firebase.apps.length) firebase.initializeApp(config);
    await firebase.auth().signInAnonymously();
    db = firebase.database();

    const timestampRef = db.ref("/TIMESTAMP/timestamps");
    await timestampRef.set(firebase.database.ServerValue.TIMESTAMP);

    


    let simulatedTime = 0;

    let fetched = false;

    timestampRef.on("value", async (snapshot) => {
      const serverTimestamp = snapshot.val();
      if (!serverTimestamp || fetched) return;

      simulatedTime = serverTimestamp;
      fetched = true;

      // 🛠️ ⬇️ Manually set time parts once right now
      istDate = new Date(simulatedTime);
      yyyy = istDate.getFullYear();
      MM = pad(istDate.getMonth() + 1);
      dd = pad(istDate.getDate());
      currentdate = `${yyyy}-${MM}-${dd}`
      localStorage.setItem("currentDate",currentdate);
      currentTime = `${pad(istDate.getHours())}:${pad(istDate.getMinutes())}:${pad(istDate.getSeconds())}`;
      dayName = istDate.toLocaleDateString("en-IN", { weekday: "long" });
      currentDay = dayMap[dayName];

      // 🕒 Continue ticking time forward every second
      setInterval(() => {
        simulatedTime += 1000;
        istDate = new Date(simulatedTime);
        localStorage.setItem("timestamp", simulatedTime);

       
        document.getElementById("live-time").innerText = istDate.toLocaleTimeString("en-IN", {
           hour: "2-digit",
           minute: "2-digit",
           second: "2-digit",

      if (!snack) {
        snack = document.createElement("div");
        snack.id = "snackbar";
        snack.style.position = "fixed";
        snack.style.bottom = "20px";
        snack.style.left = "50%";
        snack.style.transform = "translateX(-50%)";
        snack.style.padding = "12px 24px";
        snack.style.borderRadius = "6px";
        snack.style.color = "white";
        snack.style.fontWeight = "bold";
        snack.style.zIndex = 9999;
        document.body.appendChild(snack);
      }
      snack.style.backgroundColor = color;
      snack.innerText = message;
      snack.style.opacity = 1;

      setTimeout(() => {
