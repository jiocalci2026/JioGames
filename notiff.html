<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Send OneSignal Notification</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f6fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      width: 400px;
    }
    h1 {
      font-size: 1.3rem;
      text-align: center;
      margin-bottom: 1rem;
      color: #333;
    }
    input, textarea, button {
      width: 100%;
      margin-bottom: 1rem;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
    }
    button {
      background: #0078ff;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #005fcc;
    }
    .status {
      text-align: center;
      font-weight: bold;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Send Push Notification</h1>

    <input type="text" id="appId" placeholder="Enter OneSignal App ID" />
    <input type="text" id="apiKey" placeholder="Enter REST API Key" />

    <input type="text" id="title" placeholder="Notification Title" />
    <textarea id="message" rows="4" placeholder="Notification Message"></textarea>

    <input type="text" id="key" placeholder="Tag Key (optional)" />
    <input type="text" id="value" placeholder="Tag Value (optional)" />
    <input type="text" id="smallImage" placeholder="Small Logo URL (optional)" />
    <input type="text" id="bigImage" placeholder="Big Picture URL (optional)" />

    <button id="sendBtn">Send Notification</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    async function sendNotification() {
      const appId = document.getElementById("appId").value.trim();
      const apiKey = document.getElementById("apiKey").value.trim();
      const title = document.getElementById("title").value.trim();
      const message = document.getElementById("message").value.trim();
      const key = document.getElementById("key").value.trim();
      const value = document.getElementById("value").value.trim();
      const smallImage = document.getElementById("smallImage").value.trim();
      const bigImage = document.getElementById("bigImage").value.trim();
      const statusEl = document.getElementById("status");

      if (!appId || !apiKey) {
        statusEl.textContent = "Please enter App ID and REST API Key.";
        statusEl.style.color = "red";
        return;
      }
      if (!title || !message) {
        statusEl.textContent = "Please enter title and message.";
        statusEl.style.color = "red";
        return;
      }

      statusEl.textContent = "Sending...";
      statusEl.style.color = "#555";

      let bodyData = {
        app_id: appId,
        headings: { en: title },
        contents: { en: message },
      };

      if (smallImage) {
        bodyData.small_icon = smallImage;
        bodyData.large_icon = smallImage;
      }

      if (bigImage) {
        bodyData.big_picture = bigImage;
        bodyData.ios_attachments = { id1: bigImage };
      }

      if (key && value) {
        bodyData.filters = [
          { field: "tag", key: key, relation: "=", value: value },
        ];
      } else {
        bodyData.included_segments = ["All"];
      }

      try {
        const response = await fetch("https://onesignal.com/api/v1/notifications", {
          method: "POST",
          headers: {
            "Content-Type": "application/json; charset=utf-8",
            "Authorization": `Basic ${apiKey}`,
          },
          body: JSON.stringify(bodyData),
        });

        const data = await response.json();
        if (data.errors) throw new Error(data.errors.join(", "));

        statusEl.textContent = "✅ Notification sent successfully!";
        statusEl.style.color = "green";
      } catch (err) {
        statusEl.textContent = "❌ Error: " + err.message;
        statusEl.style.color = "red";
      }
    }

    document.getElementById("sendBtn").addEventListener("click", sendNotification);
  </script>
</body>
</html>
